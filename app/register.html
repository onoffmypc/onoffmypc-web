<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Create account</h1>
    <p class="subtitle">Free during early access.</p>

    <div id="error" class="error-msg"></div>

    <form id="register-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" minlength="8" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
