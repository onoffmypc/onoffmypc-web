<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css?v=9" />
  <script src="/js/theme.js?v=1"></script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Create account</h1>
    <p class="subtitle">Early access — invite code required.</p>

    <div id="error" class="error-msg"></div>

    <form id="register-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pass-wrap">
          <input type="password" id="password" autocomplete="new-password" placeholder="Min. 8 characters" minlength="8" required />
          <button type="button" class="pass-eye" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <div class="pass-wrap">
          <input type="password" id="confirm-password" autocomplete="new-password" placeholder="Re-enter password" minlength="8" required />
          <button type="button" class="pass-eye" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="invite-code">Invite Code</label>
        <input type="text" id="invite-code" autocomplete="off" placeholder="Enter your invite code" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></p>
  </div>
</div>

<script src="/js/api.js?v=9"></script>
<script src="/js/ui.js?v=2"></script>
<script src="/js/auth.js?v=5"></script>
</body>
</html>
