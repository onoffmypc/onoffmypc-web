<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<nav class="app-nav">
  <div class="app-nav-inner">
    <span class="app-logo">OnOffMyPC</span>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
  </div>
</nav>

<main class="app-main">
  <div class="section-header">
    <h1>Your Devices</h1>
    <button class="btn btn-primary" id="add-device-btn">+ Add Device</button>
  </div>
  <div id="devices-list">
    <p class="loading">Loading…</p>
  </div>
</main>

<!-- Add device modal -->
<div id="add-modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <h2>Add Device</h2>

    <div id="modal-form">
      <div id="add-error" class="error-msg"></div>
      <div class="field">
        <label for="device-name">Device Name</label>
        <input type="text" id="device-name" placeholder="e.g. Home PC" maxlength="64" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="create-btn">Create</button>
      </div>
    </div>

    <div id="token-reveal" style="display:none">
      <p class="token-hint">Copy this token and paste it into your ESP32 firmware config. You won't see it again.</p>
      <div class="token-box" id="device-token"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="copy-btn">Copy token</button>
        <button class="btn btn-primary" id="done-btn">Done</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
