<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css?v=9" />
  <script src="/js/theme.js?v=1"></script>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <form id="forgot-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
    </form>

    <p class="auth-switch"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script src="/js/api.js?v=9"></script>
<script src="/js/forgot-password.js?v=4"></script>
</body>
</html>
