<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <form id="forgot-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Send reset link</button>
    </form>

    <p class="auth-switch"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  if (api.token.get()) location.replace('/dashboard.html')

  const form      = document.getElementById('forgot-form')
  const errorEl   = document.getElementById('error')
  const successEl = document.getElementById('success')
  const btn       = form.querySelector('button[type=submit]')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    errorEl.classList.remove('show')
    successEl.classList.remove('show')

    const email = document.getElementById('email').value.trim()
    btn.disabled = true
    btn.textContent = 'Sending…'

    await api.forgotPassword(email)

    // Always show the same message regardless of outcome (prevents email enumeration)
    btn.disabled = false
    btn.textContent = 'Send reset link'
    successEl.textContent = 'If an account with that email exists, a reset link is on its way.'
    successEl.classList.add('show')
    form.reset()
  })
</script>
</body>
</html>
