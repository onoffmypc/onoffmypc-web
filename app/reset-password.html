<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css?v=4" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Choose new password</h1>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <form id="reset-form">
      <div class="field">
        <label for="password">New password</label>
        <div class="pass-wrap">
          <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters" required />
          <button type="button" class="pass-eye" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <div class="pass-wrap">
          <input type="password" id="confirm" autocomplete="new-password" placeholder="Repeat your password" required />
          <button type="button" class="pass-eye" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Set new password</button>
    </form>

    <p class="auth-switch"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script src="/js/api.js?v=7"></script>
<script src="/js/ui.js?v=2"></script>
<script src="/js/reset-password.js?v=4"></script>
</body>
</html>
