<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Choose new password</h1>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <form id="reset-form">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters" required />
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" autocomplete="new-password" placeholder="Repeat your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Set new password</button>
    </form>

    <p class="auth-switch"><a href="/login.html">Back to sign in</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  if (api.token.get()) location.replace('/dashboard.html')

  const token     = new URLSearchParams(location.search).get('token')
  const form      = document.getElementById('reset-form')
  const errorEl   = document.getElementById('error')
  const successEl = document.getElementById('success')
  const btn       = form.querySelector('button[type=submit]')

  if (!token) {
    errorEl.textContent = 'Invalid or missing reset link. Please request a new one.'
    errorEl.classList.add('show')
    btn.disabled = true
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    errorEl.classList.remove('show')
    successEl.classList.remove('show')

    const password = document.getElementById('password').value
    const confirm  = document.getElementById('confirm').value

    if (password.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.'
      errorEl.classList.add('show')
      return
    }
    if (password !== confirm) {
      errorEl.textContent = 'Passwords do not match.'
      errorEl.classList.add('show')
      return
    }

    btn.disabled = true
    btn.textContent = 'Saving…'

    const { error } = await api.resetPassword(token, password)

    if (error) {
      btn.disabled = false
      btn.textContent = 'Set new password'
      errorEl.textContent = error === 'invalid or expired reset link'
        ? 'This reset link has expired or already been used. Please request a new one.'
        : error
      errorEl.classList.add('show')
      return
    }

    form.style.display = 'none'
    successEl.textContent = 'Password updated. Redirecting to sign in…'
    successEl.classList.add('show')
    setTimeout(() => location.replace('/login.html'), 2000)
  })
</script>
</body>
</html>
