<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css?v=3" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="https://onoffmypc.com" class="auth-logo">OnOffMyPC</a>
    <h1>Sign in</h1>
    <p class="subtitle">Control your PC from anywhere.</p>

    <div id="success" class="success-msg"></div>
    <div id="error" class="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pass-wrap">
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required />
          <button type="button" class="pass-eye" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <p class="auth-switch"><a href="/forgot-password.html">Forgot password?</a></p>
    <p class="auth-switch">Don't have an account? <a href="/register.html">Register</a></p>
  </div>
</div>

<script src="/js/api.js?v=5"></script>
<script src="/js/ui.js?v=2"></script>
<script src="/js/auth.js?v=4"></script>
</body>
</html>
