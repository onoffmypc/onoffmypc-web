<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device — OnOffMyPC</title>
  <link rel="stylesheet" href="/css/app.css?v=9" />
  <script src="/js/theme.js?v=1"></script>
</head>
<body>

<div id="offline-banner" class="offline-banner">Connection lost — retrying…</div>

<nav class="app-nav">
  <div class="app-nav-inner">
    <span class="app-logo">OnOffMyPC</span>
    <button class="nav-toggle" id="nav-toggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="nav-actions">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="nav-actions" id="nav-actions">
      <a href="/account.html" class="btn btn-ghost btn-sm">Account</a>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
    </div>
  </div>
</nav>

<main class="app-main">
  <a href="/dashboard.html" class="back-link">← Back to devices</a>

  <div class="device-detail-header">
    <h1 id="device-title">Device</h1>
    <span class="badge badge-offline" id="device-status">—</span>
    <span class="device-firmware is-hidden" id="device-firmware"></span>
    <span class="refresh-indicator" id="refresh-indicator"></span>
  </div>

  <div id="loading" class="loading"><span class="spinner"></span>Loading…</div>

  <div id="content" class="is-hidden">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">PC State</div>
        <div class="stat-value" id="stat-pc">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Temperature</div>
        <div class="stat-value" id="stat-temp">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="stat-humidity">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Signal</div>
        <div class="stat-value" id="stat-rssi">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Update</div>
        <div class="stat-value stat-sm" id="stat-updated">—</div>
      </div>
    </div>

    <div class="controls-row">
      <button class="btn btn-success" id="cmd-power-on">Power On</button>
      <button class="btn btn-danger"  id="cmd-power-off">Power Off</button>
      <button class="btn btn-danger"  id="cmd-power-off-force" title="Hold power button 6s — forces shutdown">Force Off</button>
      <button class="btn btn-warn"    id="cmd-reset">Reset</button>
    </div>

    <div class="table-section">
      <h2>Schedule a command</h2>
      <div class="schedule-form">
        <select id="sched-type">
          <option value="power_on">Power On</option>
          <option value="power_off">Power Off</option>
          <option value="power_off_force">Force Off</option>
          <option value="reset">Reset</option>
        </select>
        <input type="datetime-local" id="sched-at" />
        <button class="btn btn-primary btn-sm" id="sched-btn">Schedule</button>
      </div>
      <div id="sched-error" class="error-msg"></div>
      <div id="schedules-list"></div>
    </div>

    <div class="table-section">
      <h2>Temperature — last 7 days</h2>
      <div id="chart"></div>
    </div>

    <div class="table-section">
      <h2>Telemetry History</h2>
      <table>
        <thead>
          <tr><th>Time</th><th>PC</th><th>Temp</th><th>Humidity</th><th>RSSI</th></tr>
        </thead>
        <tbody id="telemetry-body"></tbody>
      </table>
    </div>

    <div class="table-section">
      <h2>Command History</h2>
      <table>
        <thead>
          <tr><th>Time</th><th>Command</th><th>Status</th></tr>
        </thead>
        <tbody id="commands-body"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast-wrap" id="toast-wrap"></div>

<script src="/js/api.js?v=9"></script>
<script src="/js/nav.js?v=1"></script>
<script src="/js/confirm.js?v=1"></script>
<script src="/js/device.js?v=8"></script>
</body>
</html>
